name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build .app
        run: ./scripts/bundle.sh

      - name: Build DMG
        run: ./scripts/dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: dist/*.dmg

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set — skipping cask update."
            echo "One-time setup:"
            echo "  1. Create a fine-grained PAT at https://github.com/settings/personal-access-tokens/new"
            echo "     - Resource owner: Chartres"
            echo "     - Repository access: Only select repositories → homebrew-mac-dir-stat"
            echo "     - Permissions: Contents → Read and write"
            echo "  2. gh secret set HOMEBREW_TAP_TOKEN -R Chartres/mac-dir-stat -b \"<token>\""
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/MacDirStat-${VERSION}.dmg"
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "Bumping cask to $VERSION ($SHA256)"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Chartres/homebrew-mac-dir-stat.git" tap
          cd tap
          sed -i.bak -E "s/^([[:space:]]*version )\"[^\"]+\"/\\1\"${VERSION}\"/" Casks/mac-dir-stat.rb
          sed -i.bak -E "s/^([[:space:]]*sha256 )\"[^\"]+\"/\\1\"${SHA256}\"/" Casks/mac-dir-stat.rb
          rm Casks/mac-dir-stat.rb.bak
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mac-dir-stat.rb
          if git diff --staged --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "mac-dir-stat ${VERSION}"
            git push
          fi
